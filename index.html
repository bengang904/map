<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #stats {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            font-family: sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="stats">正在加载...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, 0], 2);
        const statsDiv = document.getElementById('stats');
        let invalidCount = 0;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const params = new URLSearchParams(window.location.search);
        const jsonUrl = params.get('url') || 'points.json';

        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) throw new Error('网络响应异常');
                return response.json();
            })
            .then(data => {
                const markers = [];
                const radius = 0.01;

                data.forEach(item => {
                    if (item.coords && Array.isArray(item.coords)) {
                        const randomOffsetLat = (Math.random() * 2 - 1) * radius;
                        const randomOffsetLng = (Math.random() * 2 - 1) * radius;

                        const adjustedCoords = [
                            item.coords[0] + randomOffsetLat,
                            item.coords[1] + randomOffsetLng
                        ];

                        const marker = L.marker(adjustedCoords).addTo(map);
                        marker.bindPopup(`
                            <b>${item.track}</b><br>
                            人名: ${item.artists.join(', ')}<br>
                            地点: ${item.location}
                        `);
                        
                        markers.push(marker);
                    } else {
                        invalidCount++;
                    }
                });

                statsDiv.innerText = `无效数据: ${invalidCount}`;

                if (markers.length > 0) {
                    const group = L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.1));
                } else {
                    statsDiv.innerText = '无有效数据点';
                }
            })
            .catch(error => {
                console.error('加载 JSON 失败:', error);
                statsDiv.innerText = '加载失败: 请检查 URL 参数';
            });
    </script>
</body>
</html>
