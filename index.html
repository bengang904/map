<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://{s}.tile.openstreetmap.org">
  <link rel='shortcut icon' href='https://2024-10-24.zip/images/map.png'>
  <link rel='icon' href='https://2024-10-24.zip/images/map.png'>
  <link rel='apple-touch-icon-precomposed' href='https://2024-10-24.zip/images/map.png'>
  <meta name='msapplication-TileImage' content='https://2024-10-24.zip/images/map.png'>
  <title>地图定位记录</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <style>
    body { background-color: #1a1a24; color: #ffffff; font-family: "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; background: #1a1a24; }
    
    .leaflet-popup-content-wrapper {
      background: #1e1e2a;
      color: #fff;
      border-radius: 0; 
      padding: 0;
      box-shadow: 0 12px 24px rgba(0,0,0,0.5);
      border: 1px solid #333345;
    }
    .leaflet-popup-content {
      margin: 0;
      width: 240px !important;
    }
    .leaflet-popup-tip {
      background: #1e1e2a;
      border: 1px solid #333345;
    }
    .popup-inner {
      padding: 16px;
    }
    .popup-inner img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 0;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .popup-inner h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      font-weight: bold;
      color: #58a6ff;
      border-bottom: 1px solid #333345;
      padding-bottom: 8px;
    }
    .popup-inner p {
      margin: 6px 0;
      font-size: 12px;
      line-height: 1.6;
      color: #adb5bd;
    }
    .leaflet-container a.leaflet-popup-close-button {
      color: #666;
      padding: 8px 8px 0 0;
    }
  </style>
</head>
<body>
<div id="map"></div>
<script src="js/leaflet.js"></script>
<script src="js/Control.Geocoder.js"></script>
<script src="js/L.KML.js"></script>
<script>
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OSM contributors'
  });
  const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenTopoMap'
  });

  const map = L.map('map', {
    center: [39.95, 116.46],
    zoom: 12,
    layers: [osm],
    preferCanvas: true
  });

  L.control.layers({"Street": osm, "Topographic": topo}).addTo(map);
  L.Control.geocoder().addTo(map);

  const urlParams = new URLSearchParams(window.location.search);
  const kmlFile = urlParams.get('file');

  if (kmlFile) {
    fetch(kmlFile, { cache: "force-cache" })
      .then(res => res.ok ? res.text() : Promise.reject())
      .then(kmlText => {
        const parser = new DOMParser();
        const kml = parser.parseFromString(kmlText, "text/xml");
        const placemarks = kml.getElementsByTagName("Placemark");
        for (let p of placemarks) {
            let desc = p.getElementsByTagName("description")[0];
            let name = p.getElementsByTagName("name")[0];
            if (desc && name) {
                let originalDesc = desc.textContent;
                let title = name.textContent;
                desc.textContent = `<div class="popup-inner"><h3>${title}</h3>${originalDesc}</div>`;
            }
        }
        const track = new L.KML(kml);
        map.addLayer(track);
        const bounds = track.getBounds();
        if (bounds.isValid()) map.fitBounds(bounds);
      })
      .catch(err => console.error(err));
  }
</script>
</body>
</html>
